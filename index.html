<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Suit Anatomy - Interactive 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0f3460 100%);
            overflow: hidden;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        /* ============================================
           TOP TOOLBAR - Controles principales arriba
           ============================================ */
        .top-toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .toolbar-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
        }

        .toolbar-btn:hover {
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .toolbar-btn.active {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .toolbar-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 300;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Separador visual */
        .toolbar-divider {
            width: 1px;
            height: 35px;
            background: rgba(0,0,0,0.1);
            margin: 5px 5px;
        }

        /* ============================================
           LEFT PANEL - Selector de partes (vertical)
           ============================================ */
        .parts-panel {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .part-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            overflow: hidden;
        }

        .part-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .part-btn:hover {
            transform: scale(1.1);
            border-color: #e94560;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.3);
        }

        .part-btn:hover::before {
            opacity: 0.1;
        }

        .part-btn.active {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            border-color: #e94560;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .part-btn.active::before {
            opacity: 1;
        }

        .part-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            left: 60px;
            background: #2c3e50;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            white-space: nowrap;
            z-index: 300;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Indicador de número */
        .part-number {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #e94560;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================
           INFO PANEL - Derecha, más compacto
           ============================================ */
        .info-panel {
            position: absolute;
            top: 90px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            transform: translateX(360px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 150;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .info-panel.active {
            transform: translateX(0);
        }

        .info-panel h2 {
            color: #1a1a3e;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
            border-bottom: 3px solid #e94560;
            padding-bottom: 10px;
            padding-right: 30px;
        }

        .info-panel .tech-spec {
            color: #e94560;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .info-panel p {
            color: #2c3e50;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .info-panel .function-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .info-panel .function-box strong {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.05);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            color: #7f8c8d;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #e94560;
            color: white;
            transform: rotate(90deg);
        }

        /* ============================================
           BOTTOM BAR - Progreso y AR (abajo centrado)
           ============================================ */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 200;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .progress-label {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .progress-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #bdc3c7;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .progress-dot:hover {
            transform: scale(1.3);
            background: #95a5a6;
        }

        .progress-dot.active {
            background: #e94560;
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
        }

        .progress-dot[title]:hover::after {
            content: attr(title);
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
        }

        /* AR Button */
        .ar-button {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ar-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.6);
        }

        /* ============================================
           TITLE - Arriba izquierda
           ============================================ */
        .main-title {
            position: absolute;
            top: 25px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 18px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 200;
            backdrop-filter: blur(10px);
            border-left: 5px solid #e94560;
        }

        .main-title h1 {
            color: #1a1a3e;
            font-size: 26px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .main-title p {
            color: #e94560;
            font-size: 13px;
            margin: 6px 0 0 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ============================================
           HOTSPOTS - En el modelo 3D
           ============================================ */
        .hotspot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, #e94560 0%, #c73e54 100%);
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6), 0 0 40px rgba(233, 69, 96, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            animation: pulse-glow 2s infinite;
        }

        .hotspot:hover {
            transform: scale(1.3);
            background: radial-gradient(circle, #ff6b6b 0%, #e94560 100%);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.9), 0 0 60px rgba(233, 69, 96, 0.5);
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.7);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 0 15px rgba(233, 69, 96, 0);
                transform: scale(1.05);
            }
        }

        /* ============================================
           LOADER
           ============================================ */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 1024px) {
            .top-toolbar {
                top: 100px;
                right: 10px;
                padding: 8px 12px;
            }
            
            .toolbar-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            
            .parts-panel {
                left: 10px;
                padding: 10px;
                gap: 6px;
            }
            
            .part-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
            
            .info-panel {
                width: 280px;
                top: 160px;
                right: 10px;
            }
            
            .main-title {
                padding: 12px 20px;
            }
            
            .main-title h1 {
                font-size: 20px;
            }
        }

        @media (max-width: 768px) {
            .top-toolbar {
                top: auto;
                bottom: 100px;
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                flex-direction: row;
            }
            
            .parts-panel {
                top: 100px;
                left: 10px;
                transform: none;
                flex-direction: column;
            }
            
            .info-panel {
                width: 90%;
                top: auto;
                bottom: 160px;
                left: 5%;
                right: 5%;
                transform: translateY(400px);
                max-height: 40vh;
            }
            
            .info-panel.active {
                transform: translateY(0);
            }
            
            .main-title {
                width: calc(100% - 40px);
                text-align: center;
                border-left: none;
                border-top: 5px solid #e94560;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Title - Top Left -->
        <div class="main-title">
            <h1>🚀 EMU Space Suit</h1>
            <p>Extravehicular Mobility Unit</p>
        </div>

        <!-- Loading Screen -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Loading Space Suit...</span>
        </div>

        <!-- ============================================
             TOP TOOLBAR - Vista y controles
             ============================================ -->
        <div class="top-toolbar">
            <button class="toolbar-btn" onclick="changeView('front')" title="Front View">👤</button>
            <button class="toolbar-btn" onclick="changeView('side')" title="Side View">👥</button>
            <button class="toolbar-btn" onclick="changeView('back')" title="Back View">🔄</button>
            <button class="toolbar-btn" onclick="changeView('top')" title="Top View">⬆️</button>
            
            <div class="toolbar-divider"></div>
            
            <button class="toolbar-btn active" onclick="toggleAutoRotate()" id="btnRotate" title="Auto-Rotate">🔄</button>
            <button class="toolbar-btn" onclick="resetView()" title="Reset">🏠</button>
        </div>

        <!-- ============================================
             LEFT PANEL - Selector de partes
             ============================================ -->
        <div class="parts-panel">
            <button class="part-btn" onclick="showInfo('helmet')" id="btn-helmet" title="Helmet Assembly">
                🪖
                <span class="part-number">1</span>
            </button>
            <button class="part-btn" onclick="showInfo('backpack')" id="btn-backpack" title="Life Support">
                🎒
                <span class="part-number">2</span>
            </button>
            <button class="part-btn" onclick="showInfo('chest')" id="btn-chest" title="Control Module">
                📟
                <span class="part-number">3</span>
            </button>
            <button class="part-btn" onclick="showInfo('gloves')" id="btn-gloves" title="Pressure Gloves">
                🧤
                <span class="part-number">4</span>
            </button>
            <button class="part-btn" onclick="showInfo('boots')" id="btn-boots" title="Boots">
                🥾
                <span class="part-number">5</span>
            </button>
            <button class="part-btn" onclick="showInfo('suit')" id="btn-suit" title="Suit Layers">
                🛡️
                <span class="part-number">6</span>
            </button>
        </div>

        <!-- Info Panel - Right Side -->
        <div class="info-panel" id="infoPanel">
            <button class="close-btn" onclick="closePanel()">×</button>
            <h2 id="partName">Select a Component</h2>
            <div class="tech-spec" id="techSpec">NASA Technical Specification</div>
            <p id="partDescription">Click on the hotspots or use the left panel to explore the space suit systems.</p>
            <div class="function-box">
                <strong>🔧 Primary Function</strong>
                <span id="functionText">Discover how each component protects astronauts in space.</span>
            </div>
        </div>

        <!-- ============================================
             BOTTOM BAR - Progreso y AR
             ============================================ -->
        <div class="bottom-bar">
            <div class="progress-container">
                <span class="progress-label">Explored:</span>
                <div class="progress-dot" id="dot-helmet" onclick="showInfo('helmet')" title="Helmet"></div>
                <div class="progress-dot" id="dot-backpack" onclick="showInfo('backpack')" title="Backpack"></div>
                <div class="progress-dot" id="dot-chest" onclick="showInfo('chest')" title="Chest"></div>
                <div class="progress-dot" id="dot-gloves" onclick="showInfo('gloves')" title="Gloves"></div>
                <div class="progress-dot" id="dot-boots" onclick="showInfo('boots')" title="Boots"></div>
                <div class="progress-dot" id="dot-suit" onclick="showInfo('suit')" title="Suit"></div>
            </div>
            
            <button class="ar-button" slot="ar-button">
                📱 View in Your Space
            </button>
        </div>

        <!-- 3D Model -->
        <model-viewer 
            id="astronautModel"
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
            ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
            poster="https://modelviewer.dev/shared-assets/models/Astronaut.png"
            alt="NASA Astronaut in EMU"
            camera-controls
            auto-rotate
            auto-rotate-delay="2000"
            rotation-per-second="15deg"
            camera-orbit="0deg 75deg 2.5m"
            field-of-view="30deg"
            exposure="1.2"
            shadow-intensity="1.5"
            shadow-softness="0.8"
            environment-image="https://modelviewer.dev/shared-assets/environments/moon_1k.hdr"
            skybox-image="https://modelviewer.dev/shared-assets/environments/moon_1k.hdr"
            interaction-prompt="none"
            ar
            ar-modes="webxr scene-viewer quick-look"
            ar-scale="fixed"
            onload="modelLoaded()">

            <!-- Hotspots en el modelo -->
            <button class="hotspot" slot="hotspot-helmet" 
                data-position="0 0.35 0.15" 
                data-normal="0 0.3 1"
                onclick="showInfo('helmet')">1</button>

            <button class="hotspot" slot="hotspot-backpack" 
                data-position="0 0.2 -0.25" 
                data-normal="0 0 -1"
                onclick="showInfo('backpack')">2</button>

            <button class="hotspot" slot="hotspot-chest" 
                data-position="0 0.05 0.25" 
                data-normal="0 0 1"
                onclick="showInfo('chest')">3</button>

            <button class="hotspot" slot="hotspot-gloves" 
                data-position="0.35 -0.15 0.1" 
                data-normal="1 0 0"
                onclick="showInfo('gloves')">4</button>

            <button class="hotspot" slot="hotspot-boots" 
                data-position="0.1 -0.45 0.1" 
                data-normal="0 -1 0.5"
                onclick="showInfo('boots')">5</button>

            <button class="hotspot" slot="hotspot-suit" 
                data-position="-0.2 0.1 0.15" 
                data-normal="-1 0 0"
                onclick="showInfo('suit')">6</button>

        </model-viewer>
    </div>

    <script>
        // Datos del traje espacial
        const suitData = {
            helmet: {
                name: "Helmet Assembly",
                techSpec: "NASA STD-3000T Class I",
                description: "The Extravehicular Visor Assembly provides a pressure vessel for the astronaut's head while offering 360-degree visibility. The gold-coated visor reflects solar radiation and protects against micrometeoroids.",
                function: "Maintains 4.3 psi oxygen atmosphere, protects against UV radiation, extreme temperatures (-250°F to +250°F), and orbital debris."
            },
            backpack: {
                name: "Primary Life Support System",
                techSpec: "PLSS - 7 Hour Duration",
                description: "The PLSS is a self-contained backpack providing everything needed for 7-8 hours in space. Weighs 310 lbs on Earth (0 in microgravity). Contains oxygen, CO2 scrubbers, batteries, and cooling systems.",
                function: "Supplies oxygen, removes CO2, regulates temperature, provides power, and maintains communications."
            },
            chest: {
                name: "Display & Control Module",
                techSpec: "DCM - 3.5 inch LCD",
                description: "The chest-mounted control unit serves as the astronaut's dashboard. Displays oxygen levels, battery status, CO2 levels, suit pressure, and water temperature.",
                function: "Real-time monitoring of life support, alarm warnings, and manual override for emergencies."
            },
            gloves: {
                name: "Pressure Gloves with Heaters",
                techSpec: "Phase VI Glove Assembly",
                description: "Pressurized gloves providing protection while allowing dexterity for tool use. Each glove has fingertip heaters to prevent frostbite during orbital night.",
                function: "Maintain pressure integrity while allowing finger movement for tool manipulation."
            },
            boots: {
                name: "Boots with Foot Restraints",
                techSpec: "Hard Upper Torso Integration",
                description: "Integrated boots with foot restraints that lock into ISS footplates, allowing hands-free work without drifting away.",
                function: "Enable stable positioning during EVA tasks and protect from extreme temperatures."
            },
            suit: {
                name: "Multi-Layer Insulation Suit",
                techSpec: "14 Layer Protection System",
                description: "14 layers including Liquid Cooling Garment, pressure bladder, restraint layer, thermal insulation, and micrometeoroid protection with white reflective coating.",
                function: "Creates portable Earth environment: pressure, temperature regulation, radiation and debris protection."
            }
        };

        let autoRotate = true;
        let visitedParts = new Set();
        const modelViewer = document.getElementById('astronautModel');

        function modelLoaded() {
            document.getElementById('loader').style.display = 'none';
            if (window.parent !== window) {
                window.parent.postMessage({type: 'astronaut-loaded'}, '*');
            }
        }

        function showInfo(part) {
            const data = suitData[part];
            if (!data) return;

            // Actualizar panel
            document.getElementById('partName').textContent = data.name;
            document.getElementById('techSpec').textContent = data.techSpec;
            document.getElementById('partDescription').textContent = data.description;
            document.getElementById('functionText').textContent = data.function;
            
            document.getElementById('infoPanel').classList.add('active');

            // Actualizar botones activos
            document.querySelectorAll('.part-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + part)?.classList.add('active');

            // Pausar rotación
            modelViewer.autoRotate = false;
            autoRotate = false;
            document.getElementById('btnRotate').classList.remove('active');

            // Actualizar progreso
            if (!visitedParts.has(part)) {
                visitedParts.add(part);
                document.getElementById('dot-' + part).classList.add('active');
            }

            // Notificar a Storyline
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'hotspot-click',
                    part: part,
                    name: data.name,
                    progress: (visitedParts.size / 6) * 100
                }, '*');
            }
        }

        function closePanel() {
            document.getElementById('infoPanel').classList.remove('active');
            document.querySelectorAll('.part-btn').forEach(btn => btn.classList.remove('active'));
        }

        function changeView(view) {
            const orbits = {
                front: '0deg 90deg 2m',
                side: '90deg 75deg 2m',
                back: '180deg 75deg 2m',
                top: '0deg 0deg 2m'
            };
            
            if (orbits[view]) {
                modelViewer.cameraOrbit = orbits[view];
                
                // Actualizar botones de vista
                document.querySelectorAll('.toolbar-btn').forEach((btn, index) => {
                    if (index < 4) btn.classList.remove('active');
                });
                event.target.classList.add('active');
                
                if (window.parent !== window) {
                    window.parent.postMessage({type: 'view-changed', view: view}, '*');
                }
            }
        }

        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            modelViewer.autoRotate = autoRotate;
            document.getElementById('btnRotate').classList.toggle('active', autoRotate);
        }

        function resetView() {
            modelViewer.cameraOrbit = '0deg 75deg 2.5m';
            modelViewer.fieldOfView = '30deg';
            closePanel();
            autoRotate = true;
            modelViewer.autoRotate = true;
            document.getElementById('btnRotate').classList.add('active');
            
            // Desactivar botones de vista
            document.querySelectorAll('.toolbar-btn').forEach((btn, index) => {
                if (index < 4) btn.classList.remove('active');
            });
        }

        // Escuchar mensajes de Storyline
        window.addEventListener('message', (event) => {
            if (event.data.type === 'storyline-command') {
                switch(event.data.command) {
                    case 'show-part':
                        showInfo(event.data.part);
                        break;
                    case 'change-view':
                        changeView(event.data.view);
                        break;
                    case 'reset':
                        resetView();
                        break;
                }
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnRotate').classList.add('active');
        });
    </script>
</body>
</html>
